name: Library
options:
  bundleIdPrefix: com.library
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  defaultSourceDirectoryType: syncedFolder

configFiles:
  Debug: Configuration/Debug.xcconfig
  Release: Configuration/Release.xcconfig

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N8AA4S3S96
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_MODULE_VERIFIER: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_APPROACHABLE_CONCURRENCY: NO

packages:
  RFKit:
    url: https://git.sr.ht/~rasmuslos/RFKit
    branch: main
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.6"
  socket.io-client-swift:
    url: https://github.com/socketio/socket.io-client-swift
    branch: master

schemes:
  Library:
    build:
      targets:
        Library: all
        LibraryWidgets: all
        LibraryKitTests: [test]
        LibraryUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LibraryKitTests
        - LibraryUITests
      coverageTargets:
        - LibraryKit
        - ABBKit
        - TransmissionKit
    archive:
      config: Release
  LibraryWidgets:
    build:
      targets:
        LibraryWidgets: all
    run:
      config: Debug

targets:
  LibraryKit:
    type: framework
    platform: iOS
    sources:
      - LibraryKit
    dependencies:
      - package: RFKit
        product: RFKit
      - package: SwiftSoup
      - package: socket.io-client-swift
        product: SocketIO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.library.kit
        PRODUCT_NAME: LibraryKit
        DEFINES_MODULE: true
        SWIFT_VERSION: "6.0"
    info:
      path: LibraryKit/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  LibraryMigration:
    type: framework
    platform: iOS
    sources:
      - LibraryMigration
    dependencies:
      - target: LibraryKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.library.migration
        PRODUCT_NAME: LibraryMigration
        DEFINES_MODULE: true
        SWIFT_VERSION: "6.0"
    info:
      path: LibraryMigration/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  ABBKit:
    type: framework
    platform: iOS
    sources:
      - ABBKit
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.library.abbkit
        PRODUCT_NAME: ABBKit
        DEFINES_MODULE: true
        SWIFT_VERSION: "6.0"
    info:
      path: ABBKit/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  TransmissionKit:
    type: framework
    platform: iOS
    sources:
      - TransmissionKit
    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.library.transmissionkit
        PRODUCT_NAME: TransmissionKit
        DEFINES_MODULE: true
        SWIFT_VERSION: "6.0"
    info:
      path: TransmissionKit/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  Library:
    type: application
    platform: iOS
    sources:
      - App
      - path: AppIcons
        buildPhase: resources
    dependencies:
      - target: LibraryKit
      - target: LibraryMigration
      - target: LibraryWidgets
      - target: ABBKit
      - target: TransmissionKit
      - package: SwiftSoup
    postBuildScripts:
      - name: Set build number from git commit count
        script: |
          BUILD_NUMBER=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$BUILT_PRODUCTS_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}
        CODE_SIGN_ENTITLEMENTS: App/$(ENTITLEMENT_BASE).entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: Library
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Library
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: Library Development
          ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Library Development
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Library
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppGroupIdentifier: "group.$(BUNDLE_ID_PREFIX)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        BGTaskSchedulerPermittedIdentifiers:
          - com.library.spotlightIndex
          - com.library.convenienceDownload
        CADisableMinimumFrameDurationOnPhone: true
        CoreSpotlightContinuation: true
        CFBundleURLTypes:
          - CFBundleTypeRole: None
            CFBundleURLName: com.library
            CFBundleURLSchemes:
              - library
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsArbitraryLoadsUsageDescription:
            NSATSExceptionThirdPartyServiceConnectionUsage: {}
        NSSupportsLiveActivities: true
        NSUserActivityTypes:
          - com.library.item
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - fetch
          - processing
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTExportedTypeDeclarations:
          - UTTypeConformsTo:
              - ""
            UTTypeDescription: uti.item
            UTTypeIconFiles: []
            UTTypeIdentifier: com.library.item
            UTTypeTagSpecification: {}

  LibraryWidgets:
    type: app-extension
    platform: iOS
    sources:
      - WidgetExtension
    dependencies:
      - target: LibraryKit
    postBuildScripts:
      - name: Set build number from git commit count
        script: |
          BUILD_NUMBER=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$BUILT_PRODUCTS_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.widgets
        CODE_SIGN_ENTITLEMENTS: WidgetExtension/$(ENTITLEMENT_BASE).entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Library
      configs:
        Debug:
          ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Library Development
    info:
      path: WidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: Library Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppGroupIdentifier: "group.$(BUNDLE_ID_PREFIX)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  LibraryKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LibraryKitTests
    dependencies:
      - target: LibraryKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.kitTests
        GENERATE_INFOPLIST_FILE: YES

  LibraryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - LibraryUITests
    dependencies:
      - target: Library
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.uiTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Library
        DONT_EMBED_APP_EXTENSIONS: YES
        TESTING_FRAMEWORK_MODULE_ALIAS_FLAGS: ""
